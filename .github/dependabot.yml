version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    # Stay on the Node LTS line (24.x); don't jump to Current (26+).
    # Still receives minor/patch bumps within the pinned major.
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
